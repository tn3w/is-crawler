name: Deploy docs

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Inject version
        run: |
          VERSION=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          sed -i "s|>v1.0.0<|>v${VERSION}<|g" docs/index.html

      - run: npx html-minifier-terser --collapse-whitespace --remove-comments --minify-css true --minify-js true -o docs/index.html docs/index.html && npx html-minifier-terser --collapse-whitespace --remove-comments --minify-css true --minify-js true -o docs/404.html docs/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - id: deploy
        uses: actions/deploy-pages@v4
