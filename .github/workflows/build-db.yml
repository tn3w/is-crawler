name: Build crawler DB

on:
  schedule:
    # Run weekly on Mondays at 04:00 UTC to pick up upstream changes
    - cron: '0 4 * * 1'
  push:
    paths:
      - '.github/workflows/build-db.yml'
      - 'tools/extra-crawler-user-agents.json'
      - 'tools/crawler-ip-ranges.json'
      - 'tools/build_user_agents.py'
      - 'tools/build_ip_ranges.py'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Fetch upstream crawler-user-agents.json
        run: |
          curl -fsSL \
            https://raw.githubusercontent.com/monperrus/crawler-user-agents/refs/heads/master/crawler-user-agents.json \
            -o crawler-user-agents.json

      - name: Build crawler DB files
        run: |
          python3 tools/build_user_agents.py --input crawler-user-agents.json
          python3 tools/build_ip_ranges.py --skip-errors

      - name: Commit updated files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add is_crawler/crawler-user-agents.json
          git add is_crawler/crawler-ip-ranges.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore(data): update crawler db"
            git push
          fi
