name: Publish to PyPI

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      is_new: ${{ steps.check.outputs.is_new }}
    steps:
      - uses: actions/checkout@v4

      - name: Check if version is new on PyPI
        id: check
        run: |
          VERSION=$(grep '^version' pyproject.toml | sed 's/.*= *"\(.*\)"/\1/')
          NAME=$(grep '^name' pyproject.toml | sed 's/.*= *"\(.*\)"/\1/')
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://pypi.org/pypi/${NAME}/${VERSION}/json")
          if [ "$STATUS" = "404" ]; then
            echo "is_new=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_new=false" >> "$GITHUB_OUTPUT"
          fi

  test:
    needs: check-version
    if: needs.check-version.outputs.is_new == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12', '3.13', '3.14']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      - name: Install and test
        run: |
          pip install -e ".[dev]"
          pytest

  fetch-db:
    needs: check-version
    if: needs.check-version.outputs.is_new == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Fetch crawlers.min.json from Crawlerdex
        run: |
          curl -fsSL \
            https://github.com/tn3w/Crawlerdex/releases/latest/download/crawlers.min.json \
            -o is_crawler/crawlers.min.json

      - name: Build IP ranges
        run: python3 tools/build_ip_ranges.py --skip-errors

      - uses: actions/upload-artifact@v4
        with:
          name: db
          path: |
            is_crawler/crawlers.min.json
            is_crawler/crawler-ip-ranges.json

  build:
    needs: [test, fetch-db]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: db
          path: is_crawler/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install build frontend
        run: python -m pip install --upgrade build

      - name: Build distributions
        run: python -m build

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          merge-multiple: true
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
