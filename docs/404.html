<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>404 - is-crawler</title>
        <meta name="description" content="Page not found. Return to is-crawler docs." />
        <meta name="robots" content="noindex" />
        <meta name="author" content="TN3W" />
        <link rel="icon" href="favicon.ico" type="image/x-icon" />
        <style>
            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }
            :root {
                --ink: #f5f5f5;
                --ink-2: #a8a8a8;
                --ink-3: #6a6a6a;
                --ink-4: #3a3a3a;
                --paper: #0a0a0a;
                --paper-2: #131313;
                --rule: #222222;
                --amber: #e8a54a;
                --mono: ui-monospace, 'SF Mono', Menlo, Consolas, 'Liberation Mono', monospace;
                --serif:
                    'Iowan Old Style', 'Palatino Linotype', Palatino, 'Book Antiqua', Georgia, serif;
            }
            html,
            body {
                height: 100%;
            }
            body {
                background: var(--paper);
                color: var(--ink);
                font-family: var(--mono);
                font-size: 14px;
                -webkit-font-smoothing: antialiased;
                display: flex;
                flex-direction: column;
                min-height: 100vh;
                overflow-x: hidden;
            }
            ::selection {
                background: var(--amber);
                color: #0a0a0a;
            }

            main {
                flex: 1;
                position: relative;
                padding: 80px 32px 40px;
                overflow: hidden;
                display: flex;
                align-items: center;
                justify-content: center;
            }
            main::before {
                content: '';
                position: absolute;
                inset: 0;
                background: radial-gradient(
                    ellipse 60% 50% at 50% 60%,
                    rgba(232, 165, 74, 0.05),
                    transparent 70%
                );
                pointer-events: none;
            }

            .stage {
                position: relative;
                max-width: 960px;
                margin: 0 auto;
                text-align: center;
            }

            .huge {
                font-family: var(--serif);
                font-weight: 400;
                font-size: clamp(10rem, 30vw, 24rem);
                line-height: 0.82;
                letter-spacing: -0.055em;
                color: var(--ink);
                position: relative;
            }
            .huge .zero {
                font-style: italic;
                color: var(--amber);
                display: inline-block;
            }

            .cut-line {
                display: block;
                width: 80px;
                height: 1px;
                background: var(--amber);
                margin: 40px auto;
            }

            .lede {
                font-family: var(--serif);
                font-size: clamp(1.2rem, 2.4vw, 1.6rem);
                line-height: 1.45;
                color: var(--ink);
                max-width: 560px;
                margin: 0 auto 14px;
                letter-spacing: -0.01em;
            }
            .lede em {
                font-style: italic;
                color: var(--amber);
            }
            .sub {
                font-size: 13px;
                color: var(--ink-2);
                max-width: 520px;
                margin: 0 auto 44px;
                line-height: 1.7;
            }

            .actions {
                display: flex;
                justify-content: center;
                gap: 10px;
                flex-wrap: wrap;
            }
            .btn {
                font-family: var(--mono);
                font-size: 11px;
                letter-spacing: 0.22em;
                text-transform: uppercase;
                padding: 16px 26px;
                border: 1px solid var(--rule);
                text-decoration: none;
                color: var(--ink-2);
                transition: all 0.2s;
            }
            .btn:hover {
                color: var(--amber);
                border-color: var(--amber);
            }
            .btn-primary {
                background: var(--amber);
                border-color: var(--amber);
                color: #0a0a0a;
            }
            .btn-primary:hover {
                background: transparent;
                color: var(--amber);
            }

            /* probe strip fixed at bottom of main */
            .probe-strip {
                margin-top: 72px;
                border: 1px solid var(--rule);
                background: var(--paper-2);
                display: grid;
                grid-template-columns: auto 1fr 1fr 1fr auto;
                align-items: center;
            }
            .probe-strip > div {
                padding: 20px 22px;
                border-right: 1px solid var(--rule);
                font-family: var(--mono);
                font-size: 12px;
                text-align: left;
            }
            .probe-strip > div:last-child {
                border-right: none;
            }
            .probe-strip .k {
                font-size: 10px;
                letter-spacing: 0.2em;
                text-transform: uppercase;
                color: var(--ink-3);
                margin-bottom: 6px;
            }
            .probe-strip .v {
                color: var(--ink);
            }
            .probe-strip .v.amber {
                color: var(--amber);
            }
            .probe-strip .head {
                font-size: 10px;
                letter-spacing: 0.22em;
                text-transform: uppercase;
                color: var(--ink-3);
                min-width: 140px;
            }
            .probe-strip .head .run {
                color: var(--ink);
                font-family: var(--mono);
                display: block;
                margin-top: 4px;
                letter-spacing: 0;
                text-transform: none;
                font-size: 12px;
            }
            .probe-strip .verdict-cell {
                text-align: right;
                min-width: 200px;
            }
            .probe-strip .verdict-cell .dot {
                display: inline-block;
                width: 8px;
                height: 8px;
                background: var(--ink-4);
                border-radius: 50%;
                margin-right: 8px;
                vertical-align: middle;
                animation: pulse 1.4s infinite;
            }
            .probe-strip .verdict-cell.done .dot {
                background: var(--amber);
                animation: none;
            }
            .probe-strip .verdict-cell .label {
                color: var(--ink-3);
                font-size: 10px;
                letter-spacing: 0.22em;
                text-transform: uppercase;
            }
            .probe-strip .verdict-cell.done .label {
                color: var(--amber);
            }
            @keyframes pulse {
                0%,
                100% {
                    opacity: 0.3;
                }
                50% {
                    opacity: 1;
                }
            }

            footer {
                border-top: 1px solid var(--rule);
                padding: 20px 32px;
                display: flex;
                justify-content: space-between;
                align-items: center;
                font-size: 11px;
                letter-spacing: 0.18em;
                text-transform: uppercase;
                color: var(--ink-3);
            }
            footer a {
                color: var(--ink-2);
                text-decoration: none;
            }
            footer a:hover {
                color: var(--amber);
            }
            footer .mark {
                font-family: var(--serif);
                font-style: italic;
                font-size: 22px;
                letter-spacing: -0.01em;
                text-transform: none;
                color: var(--ink-4);
            }

            @media (max-width: 780px) {
                footer {
                    padding: 16px 20px;
                }
                main {
                    padding: 48px 20px 32px;
                }
                .probe-strip {
                    grid-template-columns: 1fr;
                }
                .probe-strip > div {
                    border-right: none;
                    border-bottom: 1px solid var(--rule);
                    text-align: left;
                }
                .probe-strip > div:last-child {
                    border-bottom: none;
                    text-align: left;
                }
            }
        </style>
    </head>
    <body>
        <main>
            <div class="stage">
                <div class="huge">4<span class="zero">0</span>4</div>
                <span class="cut-line"></span>
                <p class="lede">A path that <em>isn't</em>.</p>
                <p class="sub">
                    Whatever you were looking for has moved, never existed, or was only a rumour. If
                    you are a bot, we probably already knew that.
                </p>
                <div class="actions">
                    <a href="./" class="btn btn-primary">Back to docs</a>
                    <a
                        href="https://github.com/tn3w/is-crawler"
                        target="_blank"
                        rel="noopener"
                        class="btn"
                        >GitHub</a
                    >
                </div>

                <div class="probe-strip">
                    <div class="head">
                        is_crawler()
                        <span class="run">"404-visitor"</span>
                    </div>
                    <div>
                        <div class="k">Signals</div>
                        <div class="v">-</div>
                    </div>
                    <div>
                        <div class="k">DB match</div>
                        <div class="v">none</div>
                    </div>
                    <div>
                        <div class="k">Runtime</div>
                        <div class="v amber">0.02µs</div>
                    </div>
                    <div class="verdict-cell" id="verdict">
                        <span class="dot"></span>
                        <span class="label">analyzing…</span>
                    </div>
                </div>
            </div>
        </main>

        <footer>
            <div>
                Apache-2.0 ·
                <a href="https://github.com/tn3w" target="_blank" rel="noopener">TN3W</a>
            </div>
            <div class="mark">is-crawler</div>
        </footer>

        <script>
            setTimeout(() => {
                const v = document.getElementById('verdict');
                v.classList.add('done');
                v.querySelector('.label').textContent = 'probably human';
            }, 1200);
        </script>
    </body>
</html>
